version: "3.8"

services:
  # Backend API
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: restoku-api
    restart: unless-stopped
    ports:
      - "8000:9000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=restoku
      - DB_USERNAME=restoku
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restoku

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restoku-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - restoku

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: restoku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: restoku
      POSTGRES_USER: restoku
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restoku"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restoku

  # Redis
  redis:
    image: redis:7-alpine
    container_name: restoku-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restoku

  # Queue Worker
  queue-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: restoku-queue-worker
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=restoku
      - DB_USERNAME=restoku
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restoku

volumes:
  postgres_data:
  redis_data:
  storage:

networks:
  restoku:
    driver: bridge
